# golangci-lint config for viam-viz-helpers-go (v2 schema).
#
# Goal: catch real defects (vet, ineffassign, unused, staticcheck) plus
# style consistency (gofumpt, misspell, revive) without forcing
# RDK-grade strictness on a library this small. Add linters incrementally
# as the codebase grows.
#
# Run via `make lint` or directly with `golangci-lint run`.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

formatters:
  enable:
    - gofumpt

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - revive
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # not worth the call-site churn for this many small structs
        - shadow          # too noisy in pose / scene math
    revive:
      # revive's defaults are a strong baseline. We override only the
      # rules that produce noise on conventional test idioms.
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        # package-comments disabled: revive wants every file's leading
        # comment to start with "Package visuals", but our convention is
        # file-level docs (one paragraph explaining what that file covers).
        # The package-level doc lives in service.go where the main entry
        # point's docs are.
        # - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
          exclude: ["TEST"]  # keep `t *testing.T` named for readability
        - name: redefines-builtin-id
  exclusions:
    rules:
      # Test helpers often have unused params dictated by the interface
      # they implement (SceneHooks, etc.); renaming them to `_` hurts
      # readability and obscures what's wired up.
      - path: _test\.go
        linters:
          - revive
        text: "unused-parameter"
